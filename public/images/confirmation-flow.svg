<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="600" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
  </defs>

  <rect width="600" height="400" fill="url(#bg2)"/>

  <!-- Email envelope -->
  <g transform="translate(200, 80)">
    <rect x="0" y="40" width="200" height="140" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
    <polygon points="0,40 100,120 200,40" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5" stroke-linejoin="round"/>
    <rect x="20" y="130" width="160" height="8" rx="4" fill="#e2e8f0"/>
    <rect x="40" y="148" width="120" height="6" rx="3" fill="#f1f5f9"/>
    <circle cx="170" cy="60" r="16" fill="#22c55e" opacity="0.12"/>
    <text x="165" y="66" font-family="system-ui" font-weight="700" font-size="16" fill="#22c55e">✓</text>
  </g>

  <!-- Payment card -->
  <g transform="translate(80, 240)">
    <rect x="0" y="0" width="180" height="110" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
    <rect x="16" y="16" width="40" height="28" rx="6" fill="#3b82f6" opacity="0.1"/>
    <rect x="16" y="60" width="80" height="8" rx="4" fill="#e2e8f0"/>
    <rect x="16" y="78" width="50" height="6" rx="3" fill="#f1f5f9"/>
    <text x="110" y="90" font-family="system-ui" font-weight="700" font-size="11" fill="#3b82f6">VISA</text>
  </g>

  <!-- WhatsApp message -->
  <g transform="translate(340, 260)">
    <rect x="0" y="0" width="180" height="80" rx="16" fill="#25d366"/>
    <rect x="16" y="16" width="120" height="6" rx="3" fill="white" opacity="0.6"/>
    <rect x="16" y="30" width="90" height="6" rx="3" fill="white" opacity="0.4"/>
    <rect x="16" y="48" width="140" height="10" rx="5" fill="white" opacity="0.2"/>
  </g>

  <!-- Connection lines -->
  <line x1="300" y1="220" x2="170" y2="240" stroke="#e2e8f0" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="300" y1="220" x2="430" y2="260" stroke="#e2e8f0" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- Center hub -->
  <circle cx="300" cy="200" r="30" fill="#3b82f6" opacity="0.1"/>
  <circle cx="300" cy="200" r="20" fill="#3b82f6"/>
  <text x="292" y="206" font-family="system-ui" font-weight="700" font-size="14" fill="white">⚡</text>
</svg>
