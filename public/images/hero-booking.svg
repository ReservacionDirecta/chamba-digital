<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f0f4ff"/>
      <stop offset="100%" stop-color="#e8f0fe"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#3b82f6" flood-opacity="0.12"/>
    </filter>
    <filter id="cardShadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="650" cy="100" r="180" fill="#3b82f6" opacity="0.04"/>
  <circle cx="150" cy="400" r="120" fill="#3b82f6" opacity="0.03"/>

  <!-- Main card -->
  <rect x="200" y="60" width="400" height="380" rx="20" fill="url(#card)" filter="url(#cardShadow)"/>

  <!-- Calendar header -->
  <rect x="230" y="90" width="340" height="40" rx="10" fill="#f1f5f9"/>
  <text x="260" y="116" font-family="system-ui, sans-serif" font-weight="700" font-size="16" fill="#1e293b">Junio 2026</text>
  <circle cx="530" cy="110" r="12" fill="#3b82f6" opacity="0.1"/>
  <text x="526" y="115" font-family="system-ui, sans-serif" font-weight="600" font-size="10" fill="#3b82f6">→</text>

  <!-- Calendar grid -->
  <g font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8" font-weight="500">
    <text x="255" y="155">Lu</text><text x="295" y="155">Ma</text><text x="335" y="155">Mi</text>
    <text x="375" y="155">Ju</text><text x="415" y="155">Vi</text><text x="455" y="155">Sa</text><text x="495" y="155">Do</text>
  </g>

  <!-- Calendar days -->
  <g font-family="system-ui, sans-serif" font-size="12" fill="#64748b" font-weight="500">
    <text x="258" y="180">1</text><text x="298" y="180">2</text><text x="338" y="180">3</text>
    <text x="378" y="180">4</text><text x="418" y="180">5</text><text x="458" y="180">6</text><text x="498" y="180">7</text>
    <text x="258" y="205">8</text><text x="298" y="205">9</text><text x="338" y="205">10</text>
    <text x="378" y="205">11</text><text x="418" y="205">12</text><text x="458" y="205">13</text><text x="498" y="205">14</text>
    <text x="258" y="230">15</text>
  </g>

  <!-- Selected day -->
  <rect x="388" y="213" width="24" height="24" rx="6" fill="url(#accent)" filter="url(#shadow)"/>
  <text x="396" y="230" font-family="system-ui, sans-serif" font-weight="700" font-size="12" fill="white">16</text>

  <!-- Time slots -->
  <rect x="230" y="260" width="155" height="36" rx="8" fill="#f1f5f9"/>
  <text x="250" y="283" font-family="system-ui, sans-serif" font-weight="600" font-size="13" fill="#94a3b8">09:00</text>

  <rect x="230" y="304" width="155" height="36" rx="8" fill="url(#accent)" filter="url(#shadow)"/>
  <text x="250" y="327" font-family="system-ui, sans-serif" font-weight="600" font-size="13" fill="white">10:00</text>

  <rect x="230" y="348" width="155" height="36" rx="8" fill="#f1f5f9"/>
  <text x="250" y="371" font-family="system-ui, sans-serif" font-weight="600" font-size="13" fill="#94a3b8">11:00</text>

  <!-- WhatsApp icon -->
  <circle cx="530" cy="370" r="28" fill="#25d366" opacity="0.12"/>
  <circle cx="530" cy="370" r="20" fill="#25d366"/>
  <text x="523" y="376" font-family="system-ui, sans-serif" font-weight="700" font-size="16" fill="white">W</text>

  <!-- Booking confirmed badge -->
  <rect x="420" y="270" width="130" height="80" rx="12" fill="white" filter="url(#cardShadow)"/>
  <circle cx="455" cy="295" r="12" fill="#22c55e" opacity="0.15"/>
  <text x="450" y="300" font-family="system-ui, sans-serif" font-weight="700" font-size="14" fill="#22c55e">✓</text>
  <text x="475" y="299" font-family="system-ui, sans-serif" font-weight="700" font-size="11" fill="#1e293b">Reservado</text>
  <text x="430" y="325" font-family="system-ui, sans-serif" font-weight="500" font-size="10" fill="#94a3b8">16 Jun • 10:00 AM</text>
  <text x="430" y="340" font-family="system-ui, sans-serif" font-weight="600" font-size="11" fill="#3b82f6">$49 USD</text>
</svg>
